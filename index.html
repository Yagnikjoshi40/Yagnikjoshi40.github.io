<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Fast Group | Tax & Business Consultants</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Icons & Animation Libraries -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            blue: "#006fb4",
                            red: "#cf111e",
                            green: "#0eb137",
                            yellow: "#ffca00",
                        }
                    },
                    fontFamily: {
                        heading: ["Syne", "sans-serif"],
                        body: ["DM Sans", "sans-serif"],
                    }
                }
            }
        }
    </script>

    <style>
        html { scroll-behavior: smooth; }
        .animate-marquee {
            display: inline-block;
            white-space: nowrap;
            animation: marquee 40s linear infinite;
        }
        @keyframes marquee {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 111, 180, 0.1);
        }
        .perspective-1000 { perspective: 1000px; }
        .preserve-3d { transform-style: preserve-3d; }
        .backface-hidden { backface-visibility: hidden; }
        .rotate-y-180 { transform: rotateY(180deg); }
        
        input[type="range"] {
            -webkit-appearance: none;
            background: #e2e8f0;
            height: 6px;
            border-radius: 5px;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            background: #006fb4;
            border-radius: 50%;
            cursor: pointer;
        }
    </style>
</head>
<body class="font-body text-black bg-white">

    <div id="root"></div>

    <!-- Netlify Form Detection -->
    <form name="leads" data-netlify="true" hidden>
        <input type="text" name="name" />
        <input type="tel" name="phone" />
        <input type="email" name="email" />
        <textarea name="requirements"></textarea>
        <input type="text" name="context" />
    </form>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;
        const { motion, AnimatePresence } = window.Motion;

        // Utility to format numbers to Indian Currency
        const formatINR = (val) => new Intl.NumberFormat('en-IN', { style: 'currency', currency: 'INR', maximumFractionDigits: 0 }).format(val);

        // Icon Component
        const Icon = ({ name, size = 24, className = "" }) => {
            useEffect(() => {
                lucide.createIcons();
            }, []);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        function App() {
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [modalContext, setModalContext] = useState('');

            const openLeadModal = (context) => {
                setModalContext(context);
                setIsModalOpen(true);
            };

            return (
                <div className="overflow-x-hidden">
                    <Navbar onGetStarted={() => openLeadModal('Header CTA')} />
                    
                    <Hero Section onAction={(ctx) => openLeadModal(ctx)} />
                    
                    {/* Trust Marquee */}
                    <div className="bg-brand-blue py-3 overflow-hidden whitespace-nowrap border-y border-white/10">
                        <div className="animate-marquee text-white font-bold text-[11px] uppercase tracking-widest">
                            ⚡ AMFI Registered Partner · GST Compliance Experts · 10,000+ ITR Filed · 2500+ Happy Clients · Company Registration in 7 Days · AMFI Registered Partner · GST Compliance Experts · 10,000+ ITR Filed · 2500+ Happy Clients · Company Registration in 7 Days · 
                        </div>
                    </div>

                    <BrandEcosystem onAction={(b) => openLeadModal(`Brand: ${b}`)} />
                    
                    <Services onAction={(s) => openLeadModal(`Service: ${s}`)} />

                    <ITRFinder onAction={(f) => openLeadModal(`ITR Calculator: ${f}`)} />

                    <SIPCalculator onAction={() => openLeadModal('SIP Planning')} />

                    <WhyChoose />

                    <Offices />

                    <ContactSection onFormSubmit={() => {}} />

                    <Footer />

                    {/* Global Modal */}
                    <AnimatePresence>
                        {isModalOpen && (
                            <div className="fixed inset-0 z-[2000] flex items-center justify-center px-4">
                                <motion.div 
                                    initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0 }}
                                    onClick={() => setIsModalOpen(false)}
                                    className="absolute inset-0 bg-black/60 backdrop-blur-sm"
                                />
                                <motion.div 
                                    initial={{ opacity: 0, scale: 0.9, y: 20 }} animate={{ opacity: 1, scale: 1, y: 0 }} exit={{ opacity: 0, scale: 0.9, y: 20 }}
                                    className="relative w-full max-w-lg bg-white rounded-[40px] shadow-2xl p-8 overflow-hidden"
                                >
                                    <div className="flex justify-between items-center mb-6">
                                        <div>
                                            <h3 className="font-heading font-bold text-2xl text-brand-blue">Get Started</h3>
                                            <p className="text-xs text-gray-500">Requesting info for: {modalContext}</p>
                                        </div>
                                        <button onClick={() => setIsModalOpen(false)} className="p-2 hover:bg-gray-100 rounded-full transition-colors">
                                            <Icon name="x" />
                                        </button>
                                    </div>
                                    <LeadForm context={modalContext} onSuccess={() => setTimeout(() => setIsModalOpen(false), 3000)} />
                                </motion.div>
                            </div>
                        )}
                    </AnimatePresence>

                    {/* Floating WhatsApp */}
                    <a href="https://wa.me/919819057115" target="_blank" className="fixed bottom-6 right-6 w-16 h-16 bg-[#25D366] text-white rounded-full flex items-center justify-center shadow-2xl z-[1001] hover:scale-110 transition-all border-4 border-white">
                        <Icon name="message-circle" size={32} />
                    </a>
                </div>
            );
        }

        function Navbar({ onGetStarted }) {
            const [scrolled, setScrolled] = useState(false);
            useEffect(() => {
                const h = () => setScrolled(window.scrollY > 20);
                window.addEventListener('scroll', h);
                return () => window.removeEventListener('scroll', h);
            }, []);

            return (
                <nav className={`fixed top-0 left-0 w-full h-[75px] z-50 transition-all duration-300 flex items-center px-6 md:px-12 justify-between ${scrolled ? 'bg-white shadow-lg border-b border-gray-100' : 'bg-transparent'}`}>
                    <div className="flex items-center space-x-2">
                        <span className="font-heading font-extrabold text-2xl text-brand-blue uppercase">Fast</span>
                        <div className="w-[2px] h-6 bg-brand-yellow"></div>
                        <span className="font-heading font-semibold text-xl">Group</span>
                    </div>
                    <div className="hidden lg:flex space-x-10 font-bold text-[13px] uppercase tracking-widest text-gray-600">

                        <a href="#services" className="hover:text-brand-blue transition-colors">Services</a>
                        <a href="#calculators" className="hover:text-brand-blue transition-colors">Tools</a>
                        <a href="#contact" className="hover:text-brand-blue transition-colors">Contact</a>
                    </div>
                    <button onClick={onGetStarted} className="bg-brand-blue text-white px-8 py-3 rounded-full font-bold text-sm hover:bg-brand-red transition-all shadow-lg hover:-translate-y-0.5 active:translate-y-0">
                        Get Started
                    </button>
                </nav>
            );
        }

        function Hero({ onAction }) {
            return (
                <section className="pt-40 pb-24 px-6 max-w-7xl mx-auto grid lg:grid-cols-2 gap-16 items-center">
                    <motion.div initial={{ opacity: 0, x: -30 }} animate={{ opacity: 1, x: 0 }} transition={{ duration: 0.8 }}>
                        <div className="inline-block px-4 py-1 border-2 border-brand-blue rounded-full text-[11px] font-bold text-brand-blue uppercase mb-8 tracking-[2px]">Tax & Business Advisory</div>
                        <h1 className="font-heading font-extrabold text-5xl lg:text-7xl leading-[1.1] mb-8 text-black">
                            The Architecture of <span className="text-brand-blue">Financial</span> Velocity.
                        </h1>
                        <p className="text-xl text-gray-500 mb-12 max-w-lg leading-relaxed">Precision tax compliance meets high-performance wealth distribution. Mumbai's most trusted consulting group.</p>
                        <div className="flex flex-wrap gap-4">
                            <button onClick={() => onAction('Hero Primary')} className="bg-brand-red text-white px-10 py-5 rounded-full font-bold text-lg shadow-xl hover:shadow-brand-red/20 hover:-translate-y-1 transition-all">Start My Journey →</button>

                        </div>
                        <div className="mt-16 flex space-x-12 border-t border-gray-100 pt-10">
                            <div><div className="text-4xl font-heading font-bold text-brand-blue">2500+</div><div className="text-[11px] font-bold text-gray-400 uppercase tracking-widest mt-1">Clients Served</div></div>
                            <div><div className="text-4xl font-heading font-bold text-brand-blue">₹50Cr+</div><div className="text-[11px] font-bold text-gray-400 uppercase tracking-widest mt-1">AUM Managed</div></div>
                        </div>

                    <div className="hidden lg:flex justify-center relative">

                        <motion.div animate={{ y: [0, -20, 0] }} transition={{ repeat: Infinity, duration: 4 }} className="relative z-10 w-[420px] h-[420px] bg-white rounded-[60px] shadow-2xl flex items-center justify-center border-b-8 border-brand-blue">
                            <Icon name="shield" size={180} className="text-brand-blue opacity-10 absolute" />
                            <div className="text-center p-12">
                                <Icon name="trending-up" size={80} className="text-brand-blue mx-auto mb-6" />
                                <h3 className="font-heading font-bold text-3xl">Secure Growth</h3>
                                <p className="text-gray-400 mt-2 font-medium">Compliance. Wealth. Velocity.</p>
                            </div>
                        </motion.div>
                    </div>
                </section>
            );
        }

        function BrandEcosystem({ onAction }) {
            return (
                <section id="about" className="bg-gray-50 py-32 px-6">
                    <div className="max-w-7xl mx-auto">
                        <div className="text-center mb-20">
                            <h4 className="text-brand-red font-bold text-xs tracking-[4px] uppercase mb-4">Our Ecosystem</h4>
                            <h2 className="font-heading text-4xl md:text-5xl font-extrabold">Two Brands. <span className="text-brand-blue">One Vision.</span></h2>
                        </div>
                        <div className="grid md:grid-cols-2 gap-10">
                            <BrandCard 
                                title="Fast Solutions (India) Pvt. Ltd." 
                                color="blue" 
                                icon="file-text"
                                desc="Expert tax and business consultants specializing in ITR, GST, and corporate compliance."
                                tags={["Taxation", "GST", "ITR Filing", "Compliance"]} 
                                onExplore={() => onAction('Solutions')}
                            />
                            <BrandCard 
                                title="Fast Finsure Pvt. Ltd." 
                                color="green" 
                                icon="pie-chart"
                                desc="Strategic wealth management distributing high-performance mutual funds and SIP plans."
                                tags={["Mutual Funds", "SIP", "Insurance", "Wealth"]} 
                                onExplore={() => onAction('Finsure')}
                            />
                        </div>
                    </div>
                </section>
            );
        }

        function BrandCard({ title, color, icon, desc, tags, onExplore }) {
            const colors = { blue: 'text-brand-blue border-brand-blue bg-brand-blue/5', green: 'text-brand-green border-brand-green bg-brand-green/5' };
            const iconColor = color === 'blue' ? 'text-brand-blue' : 'text-brand-green';
            return (
                <div className={`bg-white p-12 rounded-[48px] border-l-[8px] shadow-2xl shadow-gray-200 transition-all hover:-translate-y-3 ${color === 'blue' ? 'border-brand-blue' : 'border-brand-green'}`}>
                    <div className={`w-16 h-16 rounded-2xl flex items-center justify-center mb-8 ${color === 'blue' ? 'bg-brand-blue/10' : 'bg-brand-green/10'} ${iconColor}`}>
                        <Icon name={icon} size={32} />
                    </div>
                    <h3 className={`font-heading text-2xl font-bold mb-6 ${iconColor}`}>{title}</h3>
                    <p className="text-gray-500 mb-10 text-lg leading-relaxed">{desc}</p>
                    <div className="flex flex-wrap gap-3 mb-12">
                        {tags.map(t => <span key={t} className={`px-4 py-2 rounded-full text-[11px] font-bold tracking-widest uppercase ${colors[color]}`}>{t}</span>)}
                    </div>
                    <button onClick={onExplore} className={`font-bold flex items-center gap-3 group transition-all ${iconColor}`}>
                        Explore More <Icon name="arrow-right" className="group-hover:translate-x-2 transition-transform" />
                    </button>
                </div>
            );
        }

        function Services({ onAction }) {
            const list = [
                { name: "Accounting", icon: "book-open" },
                { name: "Taxation", icon: "file-minus" },
                { name: "GST Filing", icon: "clipboard-list" },
                { name: "Business Advisory", icon: "lightbulb" },
                { name: "Mutual Funds", icon: "bar-chart" },
                { name: "Life Insurance", icon: "heart" }
            ];
            return (
                <section id="services" className="py-32 px-6 max-w-7xl mx-auto">
                    <h2 className="font-heading text-4xl md:text-5xl font-extrabold text-center mb-20">Precision-Built <span className="text-brand-blue">Services</span></h2>
                    <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8">
                        {list.map(s => (
                            <div key={s.name} onClick={() => onAction(s.name)} className="bg-gray-50 p-10 rounded-[40px] cursor-pointer hover:bg-white hover:shadow-2xl transition-all border-2 border-transparent hover:border-brand-blue/10 group">
                                <div className="w-14 h-14 bg-white rounded-2xl flex items-center justify-center mb-6 text-brand-blue shadow-lg group-hover:bg-brand-blue group-hover:text-white transition-all">
                                    <Icon name={s.icon} />
                                </div>
                                <h4 className="font-heading font-bold text-xl mb-4">{s.name}</h4>
                                <p className="text-sm text-gray-400 font-bold uppercase tracking-widest flex items-center gap-2">Learn More <Icon name="chevron-right" size={14} /></p>
                            </div>
                        ))}
                    </div>
                </section>
            );
        }

        function ITRFinder({ onAction }) {
            const [step, setStep] = useState(1);
            const [income, setIncome] = useState(1200000);
            return (
                <section className="bg-gray-50 py-32 px-6">
                    <div className="max-w-3xl mx-auto bg-white p-12 md:p-20 rounded-[60px] shadow-2xl text-center border border-gray-100">
                        <h4 className="text-brand-red font-bold text-[10px] tracking-[4px] uppercase mb-4">Quick Diagnostic</h4>
                        <h3 className="font-heading text-3xl font-bold mb-10">Find Your Correct ITR Form</h3>
                        {step === 1 ? (
                            <div className="grid grid-cols-1 sm:grid-cols-3 gap-4">
                                {['Salaried', 'Business', 'Freelancer'].map(t => (
                                    <button key={t} onClick={() => setStep(2)} className="p-8 border-2 border-gray-100 rounded-3xl font-bold hover:border-brand-blue hover:text-brand-blue transition-all bg-white shadow-sm">
                                        {t}
                                    </button>
                                ))}
                            </div>
                        ) : (
                            <div className="animate-in fade-in zoom-in duration-300">
                                <div className="text-5xl font-heading font-bold text-brand-blue mb-8">{formatINR(income)}</div>
                                <input type="range" min="0" max="10000000" step="100000" value={income} onChange={e => setIncome(Number(e.target.value))} className="w-full mb-12" />
                                <div className="flex justify-between text-[10px] font-bold text-gray-400 uppercase tracking-tighter mb-10">
                                    <span>₹0</span><span>₹25L</span><span>₹50L</span><span>₹1Cr+</span>
                                </div>
                                <button onClick={() => onAction(`ITR for ${income}`)} className="w-full py-5 bg-brand-red text-white rounded-full font-bold text-lg shadow-xl shadow-brand-red/20 hover:-translate-y-1 transition-all">Get My Recommendation →</button>
                                <button onClick={() => setStep(1)} className="mt-8 text-xs text-gray-400 font-bold uppercase underline tracking-widest">Start Again</button>
                            </div>
                        )}
                    </div>
                </section>
            );
        }

        function SIPCalculator({ onAction }) {
            const [sip, setSip] = useState(10000);
            const [years, setYears] = useState(15);
            const val = useMemo(() => {
                const r = 0.12 / 12;
                const n = years * 12;
                return Math.round(sip * ((Math.pow(1 + r, n) - 1) / r) * (1 + r));
            }, [sip, years]);

            return (
                <section id="calculators" className="py-32 px-6 max-w-6xl mx-auto flex flex-col lg:grid lg:grid-cols-12 gap-16 items-center">
                    <div className="lg:col-span-7 space-y-10 w-full">
                        <h4 className="text-brand-green font-bold text-xs tracking-[4px] uppercase">Finsure Planning</h4>
                        <h2 className="font-heading text-5xl font-extrabold leading-tight">See Your Money Grow.</h2>
                        <div className="space-y-10">
                            <div className="space-y-4">
                                <div className="flex justify-between font-bold text-lg"><span>Monthly Investment</span><span className="text-brand-green">{formatINR(sip)}</span></div>
                                <input type="range" min="1000" max="100000" step="1000" value={sip} onChange={e => setSip(Number(e.target.value))} className="w-full" />
                            </div>
                            <div className="space-y-4">
                                <div className="flex justify-between font-bold text-lg"><span>Time Period</span><span className="text-brand-green">{years} Years</span></div>
                                <input type="range" min="1" max="40" value={years} onChange={e => setYears(Number(e.target.value))} className="w-full" />
                            </div>
                        </div>
                    </div>
                    <div className="lg:col-span-5 w-full">
                        <div className="bg-white p-12 rounded-[60px] shadow-[0_40px_100px_rgba(0,0,0,0.1)] border border-gray-50 text-center relative overflow-hidden">
                            <div className="absolute top-0 left-0 w-full h-3 bg-brand-green opacity-20"></div>
                            <div className="text-[12px] font-bold text-gray-400 uppercase tracking-widest mb-4">Estimated Value at 12% p.a.</div>
                            <div className="text-5xl font-heading font-extrabold text-brand-green mb-10">{formatINR(val)}</div>
                            <button onClick={onAction} className="w-full py-5 bg-brand-green text-white rounded-full font-bold text-lg shadow-xl shadow-brand-green/20 hover:-translate-y-1 transition-all">Explore Mutual Funds</button>
                            <p className="mt-8 text-[10px] text-gray-400 italic">Mutual fund investments are subject to market risks. Read all scheme documents carefully.</p>
                        </div>
                    </div>
                </section>
            );
        }

        function WhyChoose() {
            return (
                <section className="bg-white py-32 px-6 text-center max-w-7xl mx-auto">
                    <h2 className="font-heading text-4xl md:text-5xl font-extrabold mb-20">Why Clients <span className="text-brand-blue">Choose</span> Fast</h2>
                    <div className="grid grid-cols-2 md:grid-cols-4 gap-6 md:gap-10">
                        {[
                            {t: 'Response in 2 hrs', i: 'clock'},
                            {t: '15+ Years Mastery', i: 'award'},
                            {t: '256-bit Security', i: 'lock'},
                            {t: 'AMFI Registered', i: 'check-circle'}
                        ].map(item => (
                            <div key={item.t} className="p-10 bg-white rounded-[40px] border-2 border-gray-50 shadow-lg hover:shadow-xl transition-all">
                                <div className="text-brand-blue mb-6 flex justify-center"><Icon name={item.i} size={40} /></div>
                                <h4 className="font-bold text-sm md:text-base leading-tight">{item.t}</h4>
                            </div>
                        ))}
                    </div>
                </section>
            );
        }

        function Offices() {
            return (
                <section className="bg-gray-50 py-32 px-6">
                    <div className="max-w-7xl mx-auto">
                        <h2 className="font-heading text-4xl font-extrabold text-center mb-20">Our <span className="text-brand-yellow">Presence</span></h2>
                        <div className="grid md:grid-cols-2 gap-8 lg:gap-12">
                            <div className="bg-white p-12 rounded-[50px] shadow-2xl border-l-[10px] border-brand-blue">
                                <div className="flex items-center gap-4 mb-8">
                                    <Icon name="map-pin" className="text-brand-blue" size={32} />
                                    <h4 className="font-heading font-bold text-2xl">Mumbai HQ</h4>
                                </div>
                                <p className="text-gray-500 text-lg mb-10 leading-relaxed font-medium">204, Orbit Premises, Chincholi Bunder Road, Mindspace, Malad West, Mumbai 400064</p>
                                <div className="font-extrabold text-2xl text-brand-blue tracking-tighter">+91 98190 57115</div>
                            </div>
                            <div className="bg-white p-12 rounded-[50px] shadow-2xl border-l-[10px] border-brand-green">
                                <div className="flex items-center gap-4 mb-8">
                                    <Icon name="map-pin" className="text-brand-green" size={32} />
                                    <h4 className="font-heading font-bold text-2xl">Vasai Branch</h4>
                                </div>
                                <p className="text-gray-500 text-lg mb-10 leading-relaxed font-medium">706, Dattani Prism, Umelman Phata, Near D'mart, Vasai West, Palghar 401202</p>
                                <div className="font-extrabold text-2xl text-brand-green tracking-tighter">+91 99309 11231</div>
                            </div>
                        </div>
                    </div>
                </section>
            );
        }

        function ContactSection() {
            return (
                <section id="contact" className="py-32 px-6 max-w-7xl mx-auto grid lg:grid-cols-2 gap-24 items-center">
                    <div>
                        <h4 className="text-brand-red font-bold text-xs tracking-[4px] uppercase mb-4">Connect With Us</h4>
                        <h2 className="font-heading text-5xl md:text-6xl font-extrabold leading-tight mb-10">Build Your Financial <span className="text-brand-blue">Legacy</span>.</h2>
                        <p className="text-xl text-gray-500 mb-12 leading-relaxed">Let's solve your compliance hurdles and plan your wealth growth together.</p>
                        <div className="space-y-8">
                            <div className="flex items-center gap-6"><div className="w-12 h-12 bg-blue-50 rounded-full flex items-center justify-center text-brand-blue"><Icon name="mail" /></div><span className="text-xl font-bold">info@fastsolutions.in</span></div>
                            <div className="flex items-center gap-6"><div className="w-12 h-12 bg-blue-50 rounded-full flex items-center justify-center text-brand-blue"><Icon name="phone" /></div><span className="text-xl font-bold">+91 98190 57115</span></div>
                        </div>
                    </div>
                    <div className="bg-white p-12 md:p-16 rounded-[60px] shadow-[0_50px_120px_rgba(0,0,0,0.15)] border border-gray-50">
                        <LeadForm context="Main Landing Form" />
                    </div>
                </section>
            );
        }

        function LeadForm({ context, onSuccess }) {
            const [sent, setSent] = useState(false);
            const [loading, setLoading] = useState(false);

            const handleSubmit = (e) => {
                e.preventDefault();
                setLoading(true);
                const formData = new FormData(e.target);
                
                fetch("/", {
                    method: "POST",
                    headers: { "Content-Type": "application/x-www-form-urlencoded" },
                    body: new URLSearchParams(formData).toString(),
                }).then(() => {
                    setSent(true);
                    confetti({ particleCount: 200, spread: 100, origin: { y: 0.6 } });
                    if (onSuccess) onSuccess();
                });
            };

            if (sent) return (
                <div className="text-center py-12">
                    <div className="w-20 h-20 bg-brand-green/10 text-brand-green rounded-full flex items-center justify-center mx-auto mb-6"><Icon name="check-circle" size={40} /></div>
                    <h4 className="font-heading font-bold text-3xl mb-4">Request Received!</h4>
                    <p className="text-gray-500 font-medium">Our team will call you within 2 business hours.</p>
                </div>
            );

            return (
                <form onSubmit={handleSubmit} name="leads" method="POST" data-netlify="true" className="space-y-6">
                    <input type="hidden" name="form-name" value="leads" />
                    <input type="hidden" name="context" value={context} />
                    <div className="space-y-2">
                        <label className="text-[10px] font-bold text-gray-400 uppercase tracking-widest ml-4">Full Name</label>
                        <input name="name" required type="text" placeholder="John Doe" className="w-full p-5 bg-gray-50 rounded-[25px] outline-none focus:ring-2 focus:ring-brand-blue border border-transparent transition-all font-medium" />
                    </div>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div className="space-y-2">
                            <label className="text-[10px] font-bold text-gray-400 uppercase tracking-widest ml-4">Phone</label>
                            <input name="phone" required type="tel" placeholder="+91 00000 00000" className="w-full p-5 bg-gray-50 rounded-[25px] outline-none focus:ring-2 focus:ring-brand-blue border border-transparent transition-all font-medium" />
                        </div>
                        <div className="space-y-2">
                            <label className="text-[10px] font-bold text-gray-400 uppercase tracking-widest ml-4">Email</label>
                            <input name="email" required type="email" placeholder="john@example.com" className="w-full p-5 bg-gray-50 rounded-[25px] outline-none focus:ring-2 focus:ring-brand-blue border border-transparent transition-all font-medium" />
                        </div>
                    </div>
                    <div className="space-y-2">
                        <label className="text-[10px] font-bold text-gray-400 uppercase tracking-widest ml-4">Your Requirements</label>
                        <textarea name="requirements" placeholder="e.g. Need help with ITR-3 and GST Registration..." className="w-full h-32 p-5 bg-gray-50 rounded-[25px] outline-none focus:ring-2 focus:ring-brand-blue border border-transparent transition-all resize-none font-medium"></textarea>
                    </div>
                    <button type="submit" disabled={loading} className="w-full py-5 bg-brand-blue text-white rounded-[25px] font-bold text-xl hover:bg-brand-red transition-all shadow-2xl shadow-brand-blue/20 hover:-translate-y-1">
                        {loading ? 'Processing...' : 'Submit Enquiry'}
                    </button>
                </form>
            );
        }

        function Footer() {
            return (
                <footer className="bg-black text-white pt-24 pb-12 px-6">
                    <div className="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-12 text-center md:text-left">
                        <div className="space-y-4">
                            <div className="font-heading font-extrabold text-3xl uppercase tracking-tighter"><span className="text-brand-blue">Fast</span> Group</div>
                            <p className="text-gray-500 max-w-xs leading-relaxed">Precision Tax compliance meets high-performance wealth distribution.</p>
                        </div>
                        <div className="text-[11px] font-bold text-gray-600 uppercase tracking-[4px] space-y-2">
                            <div>AMFI Registered Partner</div>
                            <div>GST Compliance Experts</div>
                            <div>© 2026 The Fast Group</div>
                        </div>
                    </div>
                    <div className="max-w-7xl mx-auto mt-20 pt-10 border-t border-white/5 text-center text-[10px] text-gray-700 font-bold uppercase tracking-widest">
                        Designed with Precision for Mumbai's Growth
                    </div>
                </footer>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
